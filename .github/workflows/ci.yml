name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint and typecheck
        run: npm run lint
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/go_links
          GOOGLE_CLIENT_ID: ci-placeholder.apps.googleusercontent.com
          JWT_SECRET: ci-placeholder-secret-ci-placeholder

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/go_links
          GOOGLE_CLIENT_ID: ci-placeholder.apps.googleusercontent.com
          JWT_SECRET: ci-placeholder-secret-ci-placeholder
